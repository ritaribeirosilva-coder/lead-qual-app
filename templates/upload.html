{% extends "base.html" %}
{% block title %}Upload Leads — Semapa Next{% endblock %}

{% block content %}
<div class="page">

  <!-- Upload form -->
  <div class="card upload-card">
    <h2>Upload Leads</h2>
    <form method="POST" enctype="multipart/form-data" action="{{ url_for('upload') }}">
      <div class="form-row">
        <div class="form-group">
          <label for="file">CSV File</label>
          <input type="file" id="file" name="file" accept=".csv" required>
        </div>
        <div class="form-group">
          <label for="source">Source</label>
          <select id="source" name="source" required>
            <option value="" disabled selected>Select source</option>
            <option value="Sifted">Sifted</option>
            <option value="PitchBook">PitchBook</option>
          </select>
        </div>
        <div class="form-group form-group--submit">
          <label>&nbsp;</label>
          <button type="submit" class="btn-primary">Upload &amp; Process</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Results -->
  {% if result %}
  <div class="results">
    {% include '_results.html' %}

    <div class="actions-bar">
      <form method="POST" action="{{ url_for('process') }}">
        <button type="submit" class="btn-primary">Push to Affinity →</button>
      </form>
      <span class="actions-note">Affinity push coming in Step 7.</span>
    </div>
  </div>
  {% endif %}

</div>
{% endblock %}
